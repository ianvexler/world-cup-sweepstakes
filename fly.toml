app = "world-cup-sweepstakes"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  RAILS_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "90s"
    method = "GET"
    path = "/up"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
