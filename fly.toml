# fly.toml app configuration file generated for world-cup-sweepstakes on 2026-05-16T18:50:34Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "world-cup-sweepstakes"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "80"
  RAILS_ENV = "production"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/up"
